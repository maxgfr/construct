name: Engine re-pin

# Daily check for a new maxgfr/codeindex release. If the vendored engine
# (src/vendor/engine.meta.json) is already on the latest v* tag, this is a
# green no-op. Otherwise it re-pins, rebuilds the bundle, and runs the same
# gates as ci.yml:
#   - all green  -> commit + push straight to main, then explicitly trigger
#                   release.yml and ci.yml (a GITHUB_TOKEN push does NOT fire
#                   other workflows, so `gh workflow run` is required).
#   - any gate red -> the run simply fails (no push, no adjudication PR);
#                     the next daily cron retries. A red run is the signal
#                     to investigate locally.
# No secrets beyond the built-in GITHUB_TOKEN.
on:
  schedule:
    - cron: "31 6 * * *" # daily; minute offset staggers load across repos
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency: engine-repin

jobs:
  repin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect pinned vs latest codeindex release
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PINNED=$(node -p "require('./src/vendor/engine.meta.json').tag")
          # NOT releases/latest: the codeindex repo also publishes the
          # embed-model-v1 asset release, which is not an engine tag.
          LATEST=$(gh api repos/maxgfr/codeindex/releases --jq '[.[] | select(.tag_name | test("^v[0-9]")) | .tag_name] | first')
          echo "pinned=$PINNED" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$PINNED" = "$LATEST" ]; then
            echo "up to date ($PINNED)"
            echo "repin=false" >> "$GITHUB_OUTPUT"
          else
            echo "new engine release: $PINNED -> $LATEST"
            echo "repin=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-pin engine to the latest release
        if: steps.detect.outputs.repin == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: node scripts/sync-engine.mjs --ref "$LATEST"

      - name: Verify the vendored engine matches the new pin
        if: steps.detect.outputs.repin == 'true'
        run: node scripts/sync-engine.mjs --check

      - name: Typecheck
        if: steps.detect.outputs.repin == 'true'
        run: pnpm run typecheck

      - name: Lint
        if: steps.detect.outputs.repin == 'true'
        run: pnpm run lint

      - name: Rebuild the bundle
        if: steps.detect.outputs.repin == 'true'
        run: pnpm run build

      # check:build's own `git diff --exit-code` compares the working tree to
      # the index. Stage the rebuild here so that internal diff is clean —
      # same as the local flow (rebuild, `git add`, then verify).
      - name: Stage the rebuilt bundle + vendor pin
        if: steps.detect.outputs.repin == 'true'
        run: |
          git add \
            src/vendor/engine.meta.json src/vendor/codeindex-engine.mjs src/vendor/codeindex-engine.d.mts \
            scripts/construct.mjs skills/construct/scripts/construct.mjs \
            skills/construct/docker-compose.yml skills/construct/docker/searxng/settings.yml

      - name: Build is reproducible
        if: steps.detect.outputs.repin == 'true'
        run: pnpm run check:build

      - name: Verify skill bundle shape
        if: steps.detect.outputs.repin == 'true'
        run: pnpm run verify:bundle

      - name: Test (with coverage)
        if: steps.detect.outputs.repin == 'true'
        run: pnpm run test:coverage

      - name: Smoke-run the committed bundle (offline render + check)
        if: steps.detect.outputs.repin == 'true'
        run: pnpm run demo

      - name: Assert the SRD was produced and is structurally complete
        if: steps.detect.outputs.repin == 'true'
        run: |
          test -f /tmp/construct-demo/SRD.json
          test -f /tmp/construct-demo/requirements/FUNCTIONAL.md
          test -f /tmp/construct-demo/SRD.md

      - name: Commit + push the re-pin to main
        if: steps.detect.outputs.repin == 'true'
        id: push
        env:
          PINNED: ${{ steps.detect.outputs.pinned }}
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DIFFSTAT=$(git diff --cached --stat | tail -1)
          git commit -m "feat(engine): re-pin codeindex ${LATEST}" -m "automated re-pin, all gates green, goldens byte-identical" -m "${PINNED} -> ${LATEST}
          ${DIFFSTAT}"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger release + CI on the pushed commit
        if: steps.detect.outputs.repin == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A push authenticated with GITHUB_TOKEN does not fire other
          # workflows' `on: push` triggers — dispatch them explicitly.
          gh workflow run release.yml --ref main
          gh workflow run ci.yml --ref main
